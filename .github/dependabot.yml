# Dependabot keeps third-party actions, Cargo crates, and npm packages current.
# Critically: for GitHub Actions we specify `pinned-commit` mode so each PR
# rewrites a floating tag like `@v4` into `@<full-sha> # v4.1.1`. That gives
# us supply-chain protection without needing to know every SHA up front.

version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns: ["*"]
    # Rewrite floating tags to their commit SHA.
    # (See https://docs.github.com/en/code-security/dependabot/working-with-dependabot/pinning-an-action-to-a-commit-sha)
    allow:
      - dependency-type: "direct"
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Crypto primitives intentionally kept as a separate group so the
      # auto-merge workflow can require manual review for these crates.
      rust-crypto:
        patterns:
          - "aes*"
          - "sha2"
          - "sha1*"
          - "sha3*"
          - "hmac"
          - "pbkdf2"
          - "scrypt"
          - "ripemd*"
          - "digest*"
          - "block-buffer*"
          - "cipher*"
          - "chacha20*"
          - "poly1305*"
          - "aead*"
          - "ghash*"
          - "universal-hash*"
      rust-bitcoin-ecosystem:
        patterns: ["bitcoin*", "bip39", "secp256k1", "base58*"]
      tokio-ecosystem:
        patterns: ["tokio*", "tower*", "axum*", "hyper*"]
      tracing:
        patterns: ["tracing*"]
      serde:
        patterns: ["serde*"]
    labels:
      - "rust"
      - "dependencies"
    commit-message:
      prefix: "build"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      react:
        patterns: ["react", "react-dom", "react-router*", "@types/react*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*"]
      tauri:
        patterns: ["@tauri-apps/*"]
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint*"
          - "@typescript-eslint/*"
          - "eslint-plugin-*"
          - "eslint-config-*"
      vite:
        patterns: ["vite", "vitest*", "@vitejs/*"]
      testing:
        patterns: ["jsdom", "@testing-library/*", "@types/jsdom*"]
      ui-libs:
        patterns: ["lucide-react", "qrcode-generator", "clsx", "class-variance-authority"]
    labels:
      - "frontend"
      - "dependencies"
    commit-message:
      prefix: "build"
      include: "scope"
