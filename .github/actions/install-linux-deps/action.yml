name: install linux deps
description: >
  Install the system packages that crates in this workspace (Tauri + OpenSSL)
  link against on Linux runners. Re-used by every job that compiles the full
  Rust workspace (rust-lint, rust-test, demo-smoke).

runs:
  using: composite
  steps:
    - if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf \
          build-essential \
          libssl-dev
